<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Global Signal — Design Exploration</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@600;700;800;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #0E0D0B; color: #F5F0E8; font-family: 'Inter Tight', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  @keyframes gsBlink { 0%,100% { opacity: 1 } 50% { opacity: 0 } }
  @keyframes gsPulse { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.4; transform: scale(1.4) } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(245,240,232,0.12); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script src="tokens.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="photoreal-earth.jsx"></script>
<script type="text/babel" src="photoreal-map.jsx"></script>
<script type="text/babel" src="a-shell.jsx"></script>
<script type="text/babel" src="a-overview.jsx"></script>
<script type="text/babel" src="a-globe.jsx"></script>
<script type="text/babel" src="a-screens.jsx"></script>
<script type="text/babel" src="dirs-bcd.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { DesignCanvas, DCSection, DCArtboard } = window;

const Frame = ({ w = 1440, h = 900, children }) => (
  <div style={{ width: w, height: h, position: 'relative', overflow: 'hidden', background: '#0E0D0B', borderRadius: 8 }}>
    {children}
  </div>
);

const App = () => (
  <DesignCanvas title="Global Signal — Design Exploration" subtitle="4 directions × novel features · click any artboard to focus">
    <DCSection id="A" title="Direction A — Warm Editorial (refined)" description="Cocoa night + terracotta. Sidebar, dense, analyst-grade — closest to repo's character.">
      <DCArtboard id="A1" label="A · Overview / Orbital Command" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="overview" eyebrow="ORBITAL COMMAND" title="The world, right now" subtitle="14 streams · 200 APIs · refreshed 14s ago">
            <window.OverviewA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A2" label="A · Live Globe" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="globe" eyebrow="EARTH · LIVE" title="Live Globe" subtitle="All signals, layered on a single sphere">
            <window.GlobeScreenA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A3" label="A · Daily Briefing" width={1440} height={1100}>
        <Frame w={1440} h={1100}>
          <window.ScreenA active="briefing" eyebrow="AI BRIEFING" title="Daily briefing" subtitle="Synthesized from 14 streams · Claude Haiku 4.5">
            <window.BriefingA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A4" label="A · Seismic" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="quakes" eyebrow="USGS · LAST 24H" title="Seismic activity" subtitle="247 events · 18 above M5 · 1 tsunami watch">
            <window.QuakesA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A5" label="A · Markets" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="markets" eyebrow="CRYPTO · EQUITIES · FX" title="Markets" subtitle="Total mkt cap $2.42T · BTC dominance 54.2%">
            <window.MarketsA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A6" label="A · Correlator" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="correlate" eyebrow="CROSS-STREAM · NEW" title="Correlator" subtitle="Find patterns across any two of 200 streams">
            <window.CorrelatorA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A7" label="A · Time Machine" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="timeline" eyebrow="TEMPORAL · NEW" title="Time Machine" subtitle="Replay any moment of the planet, 1990 → now">
            <window.TimeMachineA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
      <DCArtboard id="A8" label="A · Alerts" width={1440} height={900}>
        <Frame w={1440} h={900}>
          <window.ScreenA active="alerts" eyebrow="RULES · NEW" title="Alerts" subtitle="Notify when the world crosses a threshold">
            <window.AlertsA />
          </window.ScreenA>
        </Frame>
      </DCArtboard>
    </DCSection>

    <DCSection id="B" title="Direction B — Newspaper Atlas" description="Print-broadsheet metaphor. Serifs, drop caps, columned briefings.">
      <DCArtboard id="B1" label="B · Front page" width={1440} height={1100}>
        <Frame w={1440} h={1100}><window.NewspaperAtlas /></Frame>
      </DCArtboard>
    </DCSection>

    <DCSection id="C" title="Direction C — Hacker Terminal" description="Operator console. Maximum density, monospace, keyboard-first.">
      <DCArtboard id="C1" label="C · Terminal command" width={1440} height={900}>
        <Frame w={1440} h={900}><window.HackerTerminal /></Frame>
      </DCArtboard>
    </DCSection>

    <DCSection id="D" title="Direction D — Aurora Spatial" description="Ambient, atmospheric, floating cards around a hero globe.">
      <DCArtboard id="D1" label="D · Spatial overview" width={1440} height={900}>
        <Frame w={1440} h={900}><window.AuroraSpatial /></Frame>
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
